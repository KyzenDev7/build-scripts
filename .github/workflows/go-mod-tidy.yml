name: Go Mod Tidy

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - fix/tui-preflight-checks

permissions:
  contents: write

jobs:
  tidy:
    name: Run go mod tidy (builder)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Run go mod tidy
        working-directory: ./builder
        run: |
          set -e
          go env
          go mod tidy

      - name: Commit tidy results
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@users.noreply.github.com
          message: chore: run go mod tidy (CI)
          add: 'builder/go.mod, builder/go.sum'
          push: true
